    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <title>Hotel Victoria</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- PDF Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              // Soft dark mode palette overrides
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
              'glow': '0 0 15px rgba(220, 38, 38, 0.3)', 
            }
          }
        }
      }
    </script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      
      .animate-fade-in { animation: fadeIn 0.2s ease-out; }
      .animate-slide-up { animation: slideUp 0.3s ease-out; }

      /* Print Styles */
      @media print {
        body * { visibility: hidden; }
        #print-area, #print-area * { visibility: visible; }
        #print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          min-height: 100%;
          padding: 0;
          margin: 0;
          background-color: white !important;
          color: black !important;
        }
        .no-print { display: none !important; }
      }

      /* PDF Generation Helpers */
      .force-light-mode {
        background-color: #ffffff !important;
        color: #000000 !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      .force-light-mode * {
        box-shadow: none !important;
        filter: none !important;
      }
      
      .force-light-mode .logo-path {
        fill: #ffffff !important;
        color: #ffffff !important;
        stroke: none !important;
      }

      .force-light-mode svg rect {
        color: inherit;
      }
      
      .force-light-mode h1, .force-light-mode h2, .force-light-mode h3 { color: #000000 !important; }
      .force-light-mode p, .force-light-mode span, .force-light-mode td { color: #1f2937 !important; }
      
      .force-light-mode tr { background-color: #ffffff !important; }
      .force-light-mode tr:nth-child(even) { background-color: #f9fafb !important; } 
      .force-light-mode td, .force-light-mode th { border-bottom-color: #e5e7eb !important; }
      
    </style>
  <script type="importmap">

}

</head>
  <body class="bg-gray-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 antialiased selection:bg-red-100 dark:selection:bg-red-900/50 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Use relative path './sw.js' instead of absolute '/sw.js'
          navigator.serviceWorker.register('./sw.js').then(registration => {
            console.log('SW registered successfully'); // Avoid logging 'registration' object to prevent circular structure errors
          }).catch(registrationError => {
            // Log but don't alarm user
            console.warn('SW registration failed (likely due to dev/preview environment origin mismatch). This is expected in preview.');
          });
        });
      }
    </script>
  </body>
