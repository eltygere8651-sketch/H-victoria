    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              // Soft dark mode palette overrides
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
              'glow': '0 0 15px rgba(220, 38, 38, 0.3)', 
              'card-soft': '0 10px 30px -5px rgba(0, 0, 0, 0.08), 0 4px 15px -2px rgba(0, 0, 0, 0.02)',
              'card-dark': '0 10px 30px -5px rgba(0, 0, 0, 0.3), 0 4px 15px -2px rgba(0, 0, 0, 0.1)',
              'button-red': '0 8px 20px -6px rgba(220, 38, 38, 0.5)',
              'button-green': '0 8px 20px -6px rgba(34, 197, 94, 0.5)',
              'button-blue': '0 8px 20px -6px rgba(59, 130, 246, 0.5)',
              'pop-in': '0 15px 40px -8px rgba(0,0,0,0.25)',
            },
            keyframes: {
              'pop-in': {
                '0%': { transform: 'scale(0.95) translateY(10px)', opacity: '0' },
                '100%': { transform: 'scale(1) translateY(0)', opacity: '1', },
              },
            },
            animation: {
              'pop-in': 'pop-in 0.3s ease-out forwards',
            },
          }
        }
      }
    </script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      
      .animate-fade-in { animation: fadeIn 0.2s ease-out; }
      .animate-slide-up { animation: slideUp 0.3s ease-out; }
      
      /* New pop-in animation for modals */
      .animate-pop-in { animation: pop-in 0.3s ease-out forwards; }

      /* Print Styles */
      @media print {
        body * { visibility: hidden; }
        #print-area, #print-area * { visibility: visible; }
        #print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          min-height: 100%;
          padding: 0;
          margin: 0;
          background-color: white !important;
          color: black !important;
        }
        .no-print { display: none !important; }
      }

      /* PDF Generation Helpers */
      .force-light-mode {
        background-color: #ffffff !important;
        color: #000000 !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      .force-light-mode * {
        box-shadow: none !important;
        filter: none !important;
      }
      
      .force-light-mode .logo-path {
        fill: #ffffff !important;
        color: #ffffff !important;
        stroke: none !important;
      }

      .force-light-mode svg rect {
        fill: #dc2626 !important;
      }
      
      .force-light-mode h1, .force-light-mode h2, .force-light-mode h3 { color: #000000 !important; }
      .force-light-mode p, .force-light-mode span, .force-light-mode td { color: #1f2937 !important; }
      
      .force-light-mode tr { background-color: #ffffff !important; }
      .force-light-mode tr:nth-child(even) { background-color: #f9fafb !important; } 
      .force-light-mode td, .force-light-mode th { border-bottom-color: #e5e7eb !important; }

      /* PWA Safe Area Insets for iOS */
      .pt-safe { padding-top: env(safe-area-inset-top); }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      .pl-safe { padding-left: env(safe-area-inset-left); }
      .pr-safe { padding-right: env(safe-area-inset-right); }
      
    </style>
