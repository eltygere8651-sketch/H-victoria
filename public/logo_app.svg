<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient-logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#fbbf24" />
      <stop offset="100%" stopColor="#d97706" />
    </linearGradient>
    <filter id="shadow-logo" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" floodColor="#000000" floodOpacity="0.4" />
    </filter>
    <filter id="glow-logo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" fill="#0f172a" />
  <path d="M50 15 L80 32 L80 68 L50 85 L20 68 L20 32 Z" fill="#1e293b" stroke="url(#gradient-logo)" stroke-width="4" filter="url(#shadow-logo)" />
  <path d="M50 15 V42 M50 85 V58 M20 32 L41 45 M80 32 L59 45 M20 68 L41 55 M80 68 L59 55" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />
  <circle cx="50" cy="50" r="8" fill="#fbbf24" filter="url(#glow-logo)" />
</svg>
